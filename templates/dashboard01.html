{% extends "base.html" %}

{% block content %}

<div class="container-fluid py-4">

    <h1 class="text-center mb-4">
        Plugging into the Future: An Exploration of Electricity Consumption Patterns Dashboard 01
    </h1>

    <div class="dashboard">

        <h3 class="text-center mb-3">
            State Electricity Analysis
        </h3>

        <!-- Tableau Container -->
        <div class="tableau-container">

            <div class="tableauPlaceholder"
                 id="tableauViz">

                <object class="tableauViz">

                    <param name="host_url"
                           value="https%3A%2F%2Fpublic.tableau.com%2F"/>

                    <param name="embed_code_version"
                           value="3"/>

                    <param name="site_root"
                           value=""/>

                    <param name="name"
                           value="pluggingintothefitureAnexplorationofelectricityconsumptionpatternsDasboard1/PluggingintotheFutureAnExplorationofElectricityConsumptionPatternsDashboard1"/>

                    <param name="tabs"
                           value="no"/>

                    <param name="toolbar"
                           value="yes"/>

                    <param name="display_static_image"
                           value="yes"/>

                    <param name="display_spinner"
                           value="yes"/>

                    <param name="display_overlay"
                           value="yes"/>

                    <param name="display_count"
                           value="yes"/>

                    <param name="language"
                           value="en-US"/>

                    <param name="filter"
                           value="publish=yes"/>

                </object>

            </div>

        </div>

    </div>

</div>

<style>

.tableau-container{
    width:100%;
    height:90vh;
    overflow:hidden;
    border-radius:12px;
}

.tableauPlaceholder,
.tableauViz{
    width:100% !important;
    height:100% !important;
}

@media(max-width:768px){
    .tableau-container{
        height:75vh;
    }
}

</style>

<script>

var divElement =
document.getElementById("tableauViz");

var vizElement =
divElement.getElementsByTagName("object")[0];

vizElement.style.width = "100%";
vizElement.style.height = "100%";

var script =
document.createElement("script");

script.src =
"https://public.tableau.com/javascripts/api/viz_v1.js";

divElement.appendChild(script);

</script>

{% endblock %}
